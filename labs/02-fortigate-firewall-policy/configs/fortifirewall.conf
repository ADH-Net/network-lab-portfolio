# FortiFirewall-VM64-KVM v7.4.12 — firewall configuration (sanitized)
# Exported with `show` per section. Serial number and admin password redacted.
# Three zones: port1 LAN (trusted), port2 DMZ (semi-trusted), port3 WAN (untrusted).

# --- Interfaces ---
# port1 boots in DHCP mode; "set mode static" is required before assigning an IP.
config system interface
    edit "port1"
        set alias "LAN"
        set mode static
        set ip 10.10.10.1 255.255.255.0
        set allowaccess ping https ssh
    next
    edit "port2"
        set alias "DMZ"
        set ip 10.20.20.1 255.255.255.0
        set allowaccess ping
    next
    edit "port3"
        set alias "WAN"
        set ip 203.0.113.2 255.255.255.0
        set allowaccess ping
    next
end

# --- Firewall policy (deny-by-default; only these flows permitted) ---
config firewall policy
    edit 1
        set name "LAN-to-DMZ"
        set srcintf "port1"
        set dstintf "port2"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "PING" "HTTP" "HTTPS"
        set logtraffic all
    next
    edit 2
        set name "LAN-to-WAN"
        set srcintf "port1"
        set dstintf "port3"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "PING" "HTTP" "HTTPS" "DNS"
        set nat enable                  # SNAT (source NAT) to the WAN interface IP
        set logtraffic all
    next
end

