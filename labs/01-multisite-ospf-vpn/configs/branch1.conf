# Branch1 (ABR) — VyOS configuration (sanitized)
# Exported with `show configuration commands`.
# Sanitized: password hash redacted; VyOS auto-generated defaults
# (offload, hw-id, default NTP/syslog/console/login) trimmed for readability.
# Router-ID 2.2.2.2 — ABR: area 0 on the WAN, area 1 (stub) on the LAN.

set system host-name 'Branch1'

# --- Interfaces ---
set interfaces dummy dum0 address '10.2.0.1/24'
set interfaces dummy dum0 description 'Branch1-LAN'
set interfaces ethernet eth0 address '10.0.12.2/30'
set interfaces ethernet eth0 description 'WAN-to-HQ'

# --- OSPF (ABR: backbone + stub area 1) ---
set protocols ospf parameters router-id '2.2.2.2'
set protocols ospf area 0 network '10.0.12.0/30'
set protocols ospf area 1 network '10.2.0.0/24'
set protocols ospf area 1 area-type stub
# default-passive: OSPF only on the WAN link facing HQ
set protocols ospf passive-interface 'default'
set protocols ospf interface eth0 passive disable
# point-to-point on the /30 WAN link (no DR/BDR election)
set protocols ospf interface eth0 network 'point-to-point'

# --- IPsec VPN: route-based site-to-site, Branch1 -> HQ ---
# Mirror of HQ with the directional values reversed (local/remote swapped).
set interfaces vti vti0 address '10.0.99.2/30'
set interfaces vti vti0 description 'IPsec-VTI-to-HQ'

# IKE (Phase 1) -- parameters MUST match HQ
set vpn ipsec ike-group HQ-IKE key-exchange 'ikev2'
set vpn ipsec ike-group HQ-IKE lifetime '28800'
set vpn ipsec ike-group HQ-IKE proposal 1 dh-group '14'
set vpn ipsec ike-group HQ-IKE proposal 1 encryption 'aes256'
set vpn ipsec ike-group HQ-IKE proposal 1 hash 'sha256'

# ESP (Phase 2) -- parameters MUST match HQ
set vpn ipsec esp-group HQ-ESP lifetime '3600'
set vpn ipsec esp-group HQ-ESP pfs 'dh-group14'
set vpn ipsec esp-group HQ-ESP proposal 1 encryption 'aes256'
set vpn ipsec esp-group HQ-ESP proposal 1 hash 'sha256'

# Pre-shared key -- same secret + ids as HQ
set vpn ipsec authentication psk HQ-B1-PSK id '10.0.12.1'
set vpn ipsec authentication psk HQ-B1-PSK id '10.0.12.2'
set vpn ipsec authentication psk HQ-B1-PSK secret '<PSK-REDACTED>'

# Arm IPsec on the WAN interface
set vpn ipsec interface 'eth0'

# Peer binding -- local/remote and ids REVERSED vs HQ
set vpn ipsec site-to-site peer HQ connection-type 'initiate'
set vpn ipsec site-to-site peer HQ local-address '10.0.12.2'
set vpn ipsec site-to-site peer HQ remote-address '10.0.12.1'
set vpn ipsec site-to-site peer HQ authentication mode 'pre-shared-secret'
set vpn ipsec site-to-site peer HQ authentication local-id '10.0.12.2'
set vpn ipsec site-to-site peer HQ authentication remote-id '10.0.12.1'
set vpn ipsec site-to-site peer HQ ike-group 'HQ-IKE'
set vpn ipsec site-to-site peer HQ vti bind 'vti0'
set vpn ipsec site-to-site peer HQ vti esp-group 'HQ-ESP'

# Steer HQ LAN into the tunnel (static AD 1 overrides OSPF AD 110)
set protocols static route 10.1.0.0/24 next-hop 10.0.99.1

