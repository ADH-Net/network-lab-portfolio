# HQ (hub / backbone) — VyOS configuration (sanitized)
# Exported with `show configuration commands`.
# Sanitized: password hash redacted; VyOS auto-generated defaults
# (offload, hw-id, default NTP/syslog/console/login) trimmed for readability.
# Router-ID 1.1.1.1 — all interfaces in OSPF area 0 (backbone hub).

set system host-name 'HQ'

# --- Interfaces ---
set interfaces dummy dum0 address '10.1.0.1/24'
set interfaces dummy dum0 description 'HQ-LAN'
set interfaces ethernet eth0 address '10.0.12.1/30'
set interfaces ethernet eth0 description 'WAN-to-Branch1'
set interfaces ethernet eth1 address '10.0.13.1/30'
set interfaces ethernet eth1 description 'WAN-to-Branch2'

# --- OSPF (backbone, all area 0) ---
set protocols ospf parameters router-id '1.1.1.1'
set protocols ospf area 0 network '10.0.12.0/30'
set protocols ospf area 0 network '10.0.13.0/30'
set protocols ospf area 0 network '10.1.0.0/24'
# default-passive: OSPF only on the WAN links facing the branches
set protocols ospf passive-interface 'default'
set protocols ospf interface eth0 passive disable
set protocols ospf interface eth1 passive disable
# point-to-point on the /30 WAN links (no DR/BDR election)
set protocols ospf interface eth0 network 'point-to-point'
set protocols ospf interface eth1 network 'point-to-point'

# --- IPsec VPN: route-based site-to-site, HQ -> Branch1 ---
# Virtual Tunnel Interface (overlay /30). Traffic routed into vti0 is encrypted.
set interfaces vti vti0 address '10.0.99.1/30'
set interfaces vti vti0 description 'IPsec-VTI-to-Branch1'

# IKE (Phase 1): IKEv2, AES-256, SHA-256, DH group 14
set vpn ipsec ike-group HQ-IKE key-exchange 'ikev2'
set vpn ipsec ike-group HQ-IKE lifetime '28800'
set vpn ipsec ike-group HQ-IKE proposal 1 dh-group '14'
set vpn ipsec ike-group HQ-IKE proposal 1 encryption 'aes256'
set vpn ipsec ike-group HQ-IKE proposal 1 hash 'sha256'

# ESP (Phase 2): AES-256, SHA-256, Perfect Forward Secrecy (DH group 14)
set vpn ipsec esp-group HQ-ESP lifetime '3600'
set vpn ipsec esp-group HQ-ESP pfs 'dh-group14'
set vpn ipsec esp-group HQ-ESP proposal 1 encryption 'aes256'
set vpn ipsec esp-group HQ-ESP proposal 1 hash 'sha256'

# Pre-shared key (lab only -- production would use X.509 certificates)
set vpn ipsec authentication psk HQ-B1-PSK id '10.0.12.1'
set vpn ipsec authentication psk HQ-B1-PSK id '10.0.12.2'
set vpn ipsec authentication psk HQ-B1-PSK secret '<PSK-REDACTED>'

# Arm IPsec on the WAN interface
set vpn ipsec interface 'eth0'

# Peer binding -- route-based via 'vti bind'
set vpn ipsec site-to-site peer BRANCH1 connection-type 'initiate'
set vpn ipsec site-to-site peer BRANCH1 local-address '10.0.12.1'
set vpn ipsec site-to-site peer BRANCH1 remote-address '10.0.12.2'
set vpn ipsec site-to-site peer BRANCH1 authentication mode 'pre-shared-secret'
set vpn ipsec site-to-site peer BRANCH1 authentication local-id '10.0.12.1'
set vpn ipsec site-to-site peer BRANCH1 authentication remote-id '10.0.12.2'
set vpn ipsec site-to-site peer BRANCH1 ike-group 'HQ-IKE'
set vpn ipsec site-to-site peer BRANCH1 vti bind 'vti0'
set vpn ipsec site-to-site peer BRANCH1 vti esp-group 'HQ-ESP'

# Steer Branch1 LAN into the tunnel (static AD 1 overrides OSPF AD 110)
set protocols static route 10.2.0.0/24 next-hop 10.0.99.2

