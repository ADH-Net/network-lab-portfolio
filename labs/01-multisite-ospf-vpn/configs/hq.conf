# HQ (hub / backbone) — VyOS configuration (sanitized)
# Exported with `show configuration commands`.
# Sanitized: password hash redacted; VyOS auto-generated defaults
# (offload, hw-id, default NTP/syslog/console/login) trimmed for readability.
# Router-ID 1.1.1.1 — all interfaces in OSPF area 0 (backbone hub).

set system host-name 'HQ'

# --- Interfaces ---
set interfaces dummy dum0 address '10.1.0.1/24'
set interfaces dummy dum0 description 'HQ-LAN'
set interfaces ethernet eth0 address '10.0.12.1/30'
set interfaces ethernet eth0 description 'WAN-to-Branch1'
set interfaces ethernet eth1 address '10.0.13.1/30'
set interfaces ethernet eth1 description 'WAN-to-Branch2'

# --- OSPF (backbone, all area 0) ---
set protocols ospf parameters router-id '1.1.1.1'
set protocols ospf area 0 network '10.0.12.0/30'
set protocols ospf area 0 network '10.0.13.0/30'
set protocols ospf area 0 network '10.1.0.0/24'
# default-passive: OSPF only on the WAN links facing the branches
set protocols ospf passive-interface 'default'
set protocols ospf interface eth0 passive disable
set protocols ospf interface eth1 passive disable
# point-to-point on the /30 WAN links (no DR/BDR election)
set protocols ospf interface eth0 network 'point-to-point'
set protocols ospf interface eth1 network 'point-to-point'

# --- Credentials redacted ---
# set system login user vyos authentication encrypted-password '<REDACTED>'
