# Branch2 (ABR) — VyOS configuration (sanitized)
# Exported with `show configuration commands`.
# Sanitized: password hash redacted; VyOS auto-generated defaults
# (offload, hw-id, default NTP/syslog/console/login) trimmed for readability.
# Router-ID 3.3.3.3 — ABR: area 0 on the WAN, area 2 (stub) on the LAN.

set system host-name 'Branch2'

# --- Interfaces ---
set interfaces dummy dum0 address '10.3.0.1/24'
set interfaces dummy dum0 description 'Branch2-LAN'
set interfaces ethernet eth0 address '10.0.13.2/30'
set interfaces ethernet eth0 description 'WAN-to-HQ'

# --- OSPF (ABR: backbone + stub area 2) ---
set protocols ospf parameters router-id '3.3.3.3'
set protocols ospf area 0 network '10.0.13.0/30'
set protocols ospf area 2 network '10.3.0.0/24'
set protocols ospf area 2 area-type stub
# default-passive: OSPF only on the WAN link facing HQ
set protocols ospf passive-interface 'default'
set protocols ospf interface eth0 passive disable
# point-to-point on the /30 WAN link (no DR/BDR election)
set protocols ospf interface eth0 network 'point-to-point'

# --- Credentials redacted ---
# set system login user vyos authentication encrypted-password '<REDACTED>'
